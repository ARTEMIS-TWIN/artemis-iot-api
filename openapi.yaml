  ###########################################################
  # Decision Rules
  ###########################################################
  /decision-rules:
    post:
      tags: [ Decision Rules ]
      summary: Define a Decision Rule
      description: "Defines a new rule to automate actuator actions based on sensor data."
      security: [ { bearerIndigo: [ ] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionRuleRequest'
            example:
              description: "Enable ventilation when humidity is too high"
              triggerType: "event"
              evaluationMethod: "expression"
              expression: "(H1 + H2)/2 > 60 && T1 < 22"
              variables:
                H1: "sensor-humidity-001"
                H2: "sensor-humidity-002"
                T1: "sensor-temperature-001"
              sensors:
                - alias: "H1"
                  nodeId: "node-001"
                  sensorId: "hum-001"
                - alias: "H2"
                  nodeId: "node-002"
                  sensorId: "hum-001"
                - alias: "T1"
                  nodeId: "node-001"
                  sensorId: "temp-001"
              actuators:
                - nodeId: "node-010"
                  actuatorName: "ventilation-fan"
              actions:
                - actuatorId: "ventilation-fan"
                  commandType: "setState"
                  state: "on"
      responses:
        '200':
          description: "Rule successfully defined."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataAck'
              example:
                status: "ok"
                id: "rule_01JFQ8E6E9ZP5X6N9K2Q8C"
                receivedAt: "2025-09-10T10:15:12Z"
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    get:
      tags: [ Decision Rules ]
      summary: Get All Decision Rules
      description: "Lists all decision rules defined for the current scope."
      security: [ { bearerIndigo: [ ] } ]
      responses:
        '200':
          description: "List of rules successfully returned."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DecisionRuleListResponse' }
              example:
                rules:
                  - ruleId: "rule-0001"
                    description: "Enable ventilation when humidity is too high"
                    triggerType: "event"
                    evaluationMethod: "expression"
                    expression: "(H1 + H2)/2 > 60 && T1 < 22"
                    variables:
                      H1: "sensor-humidity-001"
                      H2: "sensor-humidity-002"
                      T1: "sensor-temperature-001"
                    sensors:
                      - alias: "H1"
                        nodeId: "node-001"
                        sensorId: "hum-001"
                    actuators:
                      - nodeId: "node-010"
                        actuatorName: "ventilation-fan"
                    actions:
                      - actuatorId: "ventilation-fan"
                        commandType: "setState"
                        state: "on"
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /decision-rules/{ruleId}:
    get:
      tags: [ Decision Rules ]
      summary: Get Rule by ID
      description: "Returns the details of a specific decision rule by its ID."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '200':
          description: "Rule successfully returned."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionRule'
              example:
                ruleId: "rule-0001"
                description: "Enable ventilation when humidity is too high"
                triggerType: "event"
                evaluationMethod: "expression"
                expression: "(H1 + H2)/2 > 60 && T1 < 22"
                variables:
                  H1: "sensor-humidity-001"
                  H2: "sensor-humidity-002"
                  T1: "sensor-temperature-001"
                sensors:
                  - alias: "H1"
                    nodeId: "node-001"
                    sensorId: "hum-001"
                actuators:
                  - nodeId: "node-010"
                    actuatorName: "ventilation-fan"
                actions:
                  - actuatorId: "ventilation-fan"
                    commandType: "setState"
                    state: "on"
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    put:
      tags: [ Decision Rules ]
      summary: Update a Decision Rule
      description: "Modifies an existing decision rule."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionRule'
            example:
              ruleId: "rule-0001"
              description: "Enable ventilation when humidity is too high"
              triggerType: "event"
              evaluationMethod: "expression"
              expression: "(H1 + H2)/2 > 60 && T1 < 22"
              variables:
                H1: "sensor-humidity-001"
                H2: "sensor-humidity-002"
                T1: "sensor-temperature-001"
              sensors:
                - alias: "H1"
                  nodeId: "node-001"
                  sensorId: "hum-001"
              actuators:
                - nodeId: "node-010"
                  actuatorName: "ventilation-fan"
              actions:
                - actuatorId: "ventilation-fan"
                  commandType: "setState"
                  state: "on"
      responses:
        '200':
          description: "Rule successfully updated."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataAck'
              example:
                status: "ok"
                id: "rule_01JFQ8E6E9ZP5X6N9K2Q8C"
                receivedAt: "2025-09-10T10:20:12Z"
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      tags: [ Decision Rules ]
      summary: Delete a Decision Rule
      description: "Removes a decision rule from the system."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '204': { description: "Rule successfully deleted." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  ###########################################################
  # Actuator Commands
  ###########################################################
  /nodes/{nodeId}/commands:
    post:
      tags: [ Actuator Commands ]
      summary: Send Manual Command to Actuator
      description: "Sends an immediate manual command to an actuator (e.g., 'setState' or 'setValue')."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - $ref: '#/components/parameters/XOwner'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandsRequest'
            examples:
              setState:
                summary: Binary actuator command
                value:
                  commandType: "setState"
                  state: "on"
                  reason: "Manual override from control room"
                  timestamp: "2025-09-10T10:15:12Z"
              setValue:
                summary: Numeric actuator command
                value:
                  commandType: "setValue"
                  value: 75
                  unit: "%"
                  reason: "Partial activation due to ventilation regulation"
                  timestamp: "2025-09-10T10:15:12Z"
      responses:
        '200':
          description: "Command successfully sent."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Commands'
              example:
                issuedBy: "user-0001"
                commandType: "setState"
                state: "on"
                reason: "Manual override from control room"
                message: "Command delivered"
                timestamp: "2025-09-10T10:15:12Z"
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    get:
      tags: [ Actuator Commands ]
      summary: Get Last Command
      description: "Returns the last command that was sent to a specific actuator."
      security: 
        - bearerIndigo: [ ]
        - mutualTLS: [ ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "Last command successfully returned."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Commands'
              example:
                issuedBy: "user-0001"
                commandType: "setValue"
                value: 75
                unit: "%"
                reason: "Partial activation due to ventilation regulation"
                message: "Command delivered"
                timestamp: "2025-09-10T10:15:12Z"
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/commands/stream:
    get:
      tags: [ Actuator Commands ]
      summary: Subscribe to command events for a node (SSE)
      description: Opens an SSE stream with command events sent to the specified node.
      security:
        - bearerIndigo: [ ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: pollMs
          in: query
          required: false
          schema:
            type: integer
            default: 1000
            minimum: 250
      responses:
        '200':
          description: SSE stream opened.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: node-command
                  id: 67e0...
                  data: {"nodeId":"node_ab12cd34ef","commandType":"setState","state":"on","issuedBy":"owner-a","timestamp":"2026-03-23T10:00:00Z"}
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }


  ###########################################################
  # Enrollment & Device Credentials
  ###########################################################
  /credentials/enroll/code:
    post:
      tags: [ Enrollment & Device Credentials ]
      summary: Create one-time enrollment code for a node or a list of nodes
      description: >
        Generates a one-time pairing code (short TTL) to bootstrap a device in the field.
      security: [ { bearerIndigo: [ ] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsEnrollmentCreateRequest'
            example:
              ttlSeconds: 1800
              replaceOld: false
              graceSeconds: 300
              nodesId:
                - "node_ab12cd34ef"
                - "node_7k2m9q4x1p"

      responses:
        '201':
          description: Enrollment code(s) created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsEnrollmentCreateResponse'
  
        '400':
          description: Invalid request (e.g., nodesId empty, ttlSeconds out of range).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidPayload:
                  summary: Invalid nodesId list
                  value:
                    type: "urn:artemis:error:validation"
                    title: "Validation error"
                    status: 400
                    detail: "nodesId must contain at least 1 item and at most 100 items."
                    errorCode: "VALIDATION_ERROR"
                    correlationId: "0102030405060708"
  
        '401':
          description: Missing or invalid JWT.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    type: "urn:artemis:error:auth:unauthorized"
                    title: "Unauthorized"
                    status: 401
                    detail: "Authentication is required."
                    errorCode: "AUTH_UNAUTHORIZED"
                    correlationId: "1111222233334444"
  
        '403':
          description: Authenticated but not allowed (e.g., user lacks permission to enroll for node(s)).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                forbidden:
                  summary: Forbidden
                  value:
                    type: "urn:artemis:error:auth:forbidden"
                    title: "Forbidden"
                    status: 403
                    detail: "You do not have permission to create enrollments for one or more nodes."
                    errorCode: "AUTH_FORBIDDEN"
                    correlationId: "5555666677778888"
  
        '409':
          description: Conflict (e.g., enrollment already exists and replaceOld=false).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                enrollmentExists:
                  summary: Enrollment already exists
                  value:
                    type: "urn:artemis:error:credentials:enrollment-exists"
                    title: "Enrollment already exists"
                    status: 409
                    detail: "An active enrollment already exists for one or more nodes."
                    errorCode: "CREDENTIALS_ENROLLMENT_EXISTS"
                    correlationId: "9999aaaabbbbcccc"

  /credentials/enroll:
    post:
      tags: [ Enrollment & Device Credentials ]
      summary: Device bootstrap credentials enrollment
      description: >
        Public bootstrap endpoint protected by a one-time enrollmentCode.
        The service consumes the enrollment, resolves the bound nodeId server-side,
        generates a short-lived private key and client certificate, and returns them to the device.
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsEnrollRequest'
      responses:
        '201':
          description: Certificate issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsCertificateResponse'
              example:
                nodeId: "node_ab12cd34ef"
                privateKeyPem: |
                  -----BEGIN PRIVATE KEY-----
                  MIGH...snip...==
                  -----END PRIVATE KEY-----
                certificatePem: |
                  -----BEGIN CERTIFICATE-----
                  MIIC...snip...AB
                  -----END CERTIFICATE-----
                certificateChainPem: |
                  -----BEGIN CERTIFICATE-----
                  MIIC...snip...CA
                  -----END CERTIFICATE-----
                  -----BEGIN CERTIFICATE-----
                  MIIC...snip...ROOT
                  -----END CERTIFICATE-----
                expiresAt: "2026-12-17T10:15:00Z"
  
        '400':
          description: Invalid request (e.g., missing enrollmentCode or enrollment not found).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidPayload:
                  summary: enrollmentCode is required
                  value:
                    type: "urn:artemis:error:validation"
                    title: "Validation error"
                    status: 400
                    detail: "enrollmentCode must not be blank"
                    errorCode: "VALIDATION_ERROR"
                    correlationId: "c2f6b1b0c1a44b4c"
                enrollmentNotFound:
                  summary: Enrollment code not found
                  value:
                    type: "urn:artemis:error:400"
                    title: "Bad Request"
                    status: 400
                    detail: "Enrollment not found for code"
                    errorCode: "HTTP_400"
                    correlationId: "f0e1d2c3b4a59687"
  
        '403':
          description: Enrollment code is expired or already used.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                codeExpired:
                  summary: Enrollment code expired
                  value:
                    type: "urn:artemis:error:credentials:enrollment-expired"
                    title: "Enrollment expired"
                    status: 403
                    detail: "The enrollmentCode has expired."
                    errorCode: "CREDENTIALS_ENROLLMENT_EXPIRED"
                    correlationId: "8f3b9a2d4c1a4d11"
                codeUsed:
                  summary: Code already used
                  value:
                    type: "urn:artemis:error:credentials:enrollment-used"
                    title: "Enrollment already used"
                    status: 403
                    detail: "The enrollmentCode has already been used."
                    errorCode: "CREDENTIALS_ENROLLMENT_USED"
                    correlationId: "a0b1c2d3e4f50607"
                    nodeId: "node_ab12cd34ef"
                    enrollmentId: "enr_2f5c8c0b"
  
        '409':
          description: Conflict (e.g., certificate already exists and replaceOld=false).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                certAlreadyExists:
                  summary: Node already has a valid certificate
                  value:
                    type: "urn:artemis:error:credentials:certificate-exists"
                    title: "Certificate already exists"
                    status: 409
                    detail: "A valid certificate already exists for this nodeId."
                    errorCode: "CREDENTIALS_CERT_ALREADY_EXISTS"
                    correlationId: "f1e2d3c4b5a69788"
                    nodeId: "node_ab12cd34ef"

  /credentials/renew:
    post:
      tags: [ Enrollment & Device Credentials ]
      summary: Renew device certificate
      description: |
        Simplified renewal profile.
        The device presents its previous certificate and the service derives the node identity server-side,
        generates a fresh private key and a renewed short-lived client certificate, and returns them to the device.
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsRenewRequest'
      responses:
        '201':
          description: New certificate issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsCertificateResponse'
              example:
                nodeId: "node_ab12cd34ef"
                privateKeyPem: |
                  -----BEGIN PRIVATE KEY-----
                  MIGH...snip...==
                  -----END PRIVATE KEY-----
                certificatePem: |
                  -----BEGIN CERTIFICATE-----
                  MIIC...snip...AB
                  -----END CERTIFICATE-----
                certificateChainPem: |
                  -----BEGIN CERTIFICATE-----
                  MIIC...snip...CA
                  -----END CERTIFICATE-----
                  -----BEGIN CERTIFICATE-----
                  MIIC...snip...ROOT
                  -----END CERTIFICATE-----
                expiresAt: "2027-12-17T10:15:00Z"
  
        '400':
          description: Invalid request (e.g., malformed or unreadable previous certificate).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidCertificate:
                  summary: previousCertificatePem is invalid
                  value:
                    type: "urn:artemis:error:validation"
                    title: "Bad Request"
                    status: 400
                    detail: "Invalid previousCertificatePem"
                    errorCode: "HTTP_400"
                    correlationId: "d3f0a1b2c3d4e5f6"
  
        '401':
          description: Missing or invalid authentication context.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    type: "urn:artemis:error:auth:unauthorized"
                    title: "Unauthorized"
                    status: 401
                    detail: "Authentication is required."
                    errorCode: "AUTH_UNAUTHORIZED"
                    correlationId: "0a1b2c3d4e5f6071"
  
        '403':
          description: Authenticated but not allowed (e.g., certificate identity not mapped to a node).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                unknownDeviceIdentity:
                  summary: Certificate identity not recognized
                  value:
                    type: "urn:artemis:error:auth:unknown-device"
                    title: "Unknown device identity"
                    status: 403
                    detail: "The client certificate identity is not associated with any registered node."
                    errorCode: "AUTH_UNKNOWN_DEVICE"
                    correlationId: "1122334455667788"
  
        '409':
          description: Conflict (e.g., renewal not allowed yet, grace window, policy violation).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                renewalNotAllowedYet:
                  summary: Renewal too early
                  value:
                    type: "urn:artemis:error:credentials:renewal-too-early"
                    title: "Renewal not allowed yet"
                    status: 409
                    detail: "Renewal is not allowed yet for this node. Try later."
                    errorCode: "CREDENTIALS_RENEWAL_TOO_EARLY"
                    correlationId: "99aabbccddeeff00"
  
        '429':
          description: Too many requests (rate limited).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                rateLimited:
                  summary: Rate limit exceeded
                  value:
                    type: "urn:artemis:error:rate-limit"
                    title: "Too many requests"
                    status: 429
                    detail: "Too many renewal attempts. Please retry later."
                    errorCode: "RATE_LIMITED"
                    correlationId: "aa00bb11cc22dd33"
  ###########################################################
  # Discovery
  ###########################################################
  /api:
    servers:
      - url: /
    get:
      tags: [ Discovery ]
      operationId: getApiDiscovery
      summary: API Discovery document
      description: |
        Discovery document with metadata, versions, and useful links.
        Intended for UI, SDK, and automatic integrations.
      security: [ ]   # public
      responses:
        '200':
          description: Discovery document.
          headers:
            Cache-Control:
              schema: { type: string }
              example: "public, max-age=300"
            ETag:
              schema: { type: string }
            Last-Modified:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryDocument'
              examples:
                default:
                  value:
                    name: "ARTEMIS Platform API"
                    description: "API for managing digital twins, nodes, and IoT data."
                    status: "active"
                    versions:
                      - version: "v1"
                        status: "current"
                        path: "/api/v1/iot"
                      - version: "v2"
                        status: "future"
                        path: "/api/v2/iot"
                    links:
                      self: { href: "/api" }
                      v1: { href: "/api/v1/iot" }
                      nodes: { href: "/api/v1/iot/nodes" }
                      credentials: { href: "/api/v1/iot/credentials/enroll/code" }
components: ###########################################################
  # Security Schemes
  ###########################################################
  securitySchemes:
    bearerIndigo:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "OIDC access token issued by INDIGO identity service. Used by applications and users."
    mutualTLS:
      type: mutualTLS
      description: >
        Auth: device via mTLS OR user via JWT.
        If mTLS is used, nodeId MUST match the device certificate identity.
        If JWT is used, user must have permission on the node.
  

  ###########################################################
  # Parameters
  ###########################################################
  parameters:
    NodeId:
      name: nodeId
      in: path
      required: true
      schema: { type: string }
      description: "Unique ID of the node (sensor or actuator)."
    LinkId:
      name: linkId
      in: path
      required: true
      schema: { type: string }
      description: "Unique ID of the link between a sensor and an actuator."
    RuleId:
      name: ruleId
      in: path
      required: true
      schema: { type: string }
      description: "Unique ID of the decision rule."
    KeyId:
      name: keyId
      in: path
      required: true
      schema: { type: string }
      description: "Unique ID of the API key."
    MediaId:
      name: mediaId
      in: path
      required: true
      description: Unique media identifier.
      schema: { type: string }
    ExportId:
      name: exportId
      in: path
      required: true
      description: Media export job identifier.
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >
        Optional idempotency key for POST submissions to avoid duplicated records on retries.
      schema: { type: string }
    XOwner:
      name: X-Owner
      in: header
      required: false
      description: Node owner identity used by protected write operations.
      schema: { type: string }
    StatusNodeValue:
      name: status
      in: query
      required: false
      schema: { $ref: '#/components/schemas/StatusNodeValue' }
    BatteryLevelValue:
      name: batteryLevel
      in: query
      required: false
      schema:
        type: integer
        example: 20
    SignalStrengthValue:
      name: signalStrength
      in: query
      required: false
      schema:
        type: integer
        example: 80
    TemperatureValue:
      name: temperature
      in: query
      required: false
      schema:
        type: number
        example: 23.5


  ###########################################################
  # Schemas
  ###########################################################
  schemas:
    StatusNodeValue:
      type: string
      enum: [ active, inactive, standby ]

    Timestamp:
      type: string
      format: date-time
      example: "2025-09-10T10:15:12Z"

    NodeCapabilities:
      type: object
      properties:
        sensors:
          type: array
          items:
            $ref: '#/components/schemas/NodeSensorCapability'
        actuators:
          type: array
          items:
            $ref: '#/components/schemas/NodeActuatorCapability'
        supportedDataTypes:
          type: array
          items:
            type: string
            enum: [ scalar, vector, spatial, multimedia, temporal ]
        mqttTopics:
          type: object
          description: Server-assigned MQTT topics materialized on the node after registration.
          readOnly: true
          properties:
            publish:
              type: array
              items: { type: string }
            subscribe:
              type: array
              items: { type: string }

    NodeCapabilitiesInput:
      type: object
      properties:
        sensors:
          type: array
          items:
            $ref: '#/components/schemas/NodeSensorCapability'
        actuators:
          type: array
          items:
            $ref: '#/components/schemas/NodeActuatorCapability'
        supportedDataTypes:
          type: array
          items:
            type: string
            enum: [ scalar, vector, spatial, multimedia, temporal ]

    NodeSensorCapability:
      type: object
      properties:
        sensorId:
          type: string
          description: Stable identifier of the sensor within the node.
        name: { type: string }
        type: { type: string }
        dataType: { type: string, enum: [ scalar, vector, spatial, multimedia, temporal ] }
        unit: { type: string }
        range:
          type: array
          minItems: 2
          maxItems: 2
          items: { type: number }

    NodeActuatorCapability:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        supportedCommands:
          type: array
          description: "Abstract commands supported by the actuator."
          items:
            $ref: '#/components/schemas/CommandType'

    NodeOperationalFlags:
      type: object
      properties:
        isCalibrated:
          type: boolean
          default: true
        maintenanceRequired:
          type: boolean
          default: false
        manualOverrideActive:
          type: boolean
          default: false
        manualOverrideBy:
          type: string
        manualOverrideAt:
          $ref: '#/components/schemas/Timestamp'

    NodeDetails:
      type: object
      required: [ nodeId, name, type, capabilities, status, enabled, simulatedNode ]
      properties:
        nodeId: { type: string, description: "Unique ID of the node.", example: "node_ab12cd34ef" }
        name: { type: string, description: "Descriptive name of the node." }
        owner: { type: string, description: "Owner of the node." }
        type: { type: string, enum: [ sensor, actuator, hybrid ], description: "Type of node." }
        location:
          type: object
          description: "Location data of the node."
          required: [ indoor, installationPoint ]
          properties:
            latitude: { type: number }
            longitude: { type: number }
            altitude: { type: number }
            position:
              type: object
              properties:
                floor: { type: integer }
                room: { type: string }
                x: { type: integer }
                y: { type: integer }
                z: { type: integer }
            indoor: { type: boolean }
            installationPoint: { type: string }
        capabilities: { $ref: '#/components/schemas/NodeCapabilities' }
        rhdtId:
          type: string
          example: "rhdt-001"
        status:
          $ref: '#/components/schemas/StatusNodeValue'
        enabled: { type: boolean }
        simulatedNode: { type: boolean }
        manufacturer: { type: string }
        firmwareVersion: { type: string }
        installationTimestamp: { $ref: '#/components/schemas/Timestamp' }
        registrationTimestamp: { $ref: '#/components/schemas/Timestamp' }
        operationalFlags: { $ref: '#/components/schemas/NodeOperationalFlags' }
        metadata: { type: object }

    NodeDetailsRequest:
      type: object
      required: [ name, type, capabilities, status, enabled, simulatedNode ]
      additionalProperties: false
      properties:
        name: { type: string, description: "Descriptive name of the node." }
        owner: { type: string, description: "Owner of the node. If omitted, the service assigns a default owner." }
        type: { type: string, enum: [ sensor, actuator, hybrid ], description: "Type of node." }
        location:
          type: object
          description: "Location data of the node."
          required: [ indoor, installationPoint ]
          properties:
            latitude: { type: number }
            longitude: { type: number }
            altitude: { type: number }
            position:
              type: object
              properties:
                floor: { type: integer }
                room: { type: string }
                x: { type: integer }
                y: { type: integer }
                z: { type: integer }
            indoor: { type: boolean }
            installationPoint: { type: string }
        capabilities: { $ref: '#/components/schemas/NodeCapabilitiesInput' }
        rhdtId:
          type: string
          example: "rhdt-001"
        status:
          $ref: '#/components/schemas/StatusNodeValue'
        enabled: { type: boolean }
        simulatedNode: { type: boolean }
        manufacturer: { type: string }
        firmwareVersion: { type: string }
        installationTimestamp: { $ref: '#/components/schemas/Timestamp' }
        operationalFlags: { $ref: '#/components/schemas/NodeOperationalFlags' }
        metadata: { type: object }

    NodeUpdateCommand:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, description: "New descriptive name of the node." }
        type: { type: string, enum: [ sensor, actuator, hybrid ], description: "Updated type of node." }
        location:
          type: object
          description: "Updated location data of the node."
          required: [ indoor, installationPoint ]
          properties:
            latitude: { type: number }
            longitude: { type: number }
            altitude: { type: number }
            position:
              type: object
              properties:
                floor: { type: integer }
                room: { type: string }
                x: { type: integer }
                y: { type: integer }
                z: { type: integer }
            indoor: { type: boolean }
            installationPoint: { type: string }
        enabled: { type: boolean }
        simulatedNode: { type: boolean }
        operationalFlags: { $ref: '#/components/schemas/NodeOperationalFlags' }
        metadata: { type: object }

    UpdateNodeInformationRequest:
      type: object
      required: [ node ]
      additionalProperties: false
      properties:
        description:
          type: string
          description: "The reason why the node is being updated."
          example: "Room change"
        node:
          $ref: '#/components/schemas/NodeUpdateCommand'

    ManualOverrideRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          description: "Reason attached to the manual override audit event."
          example: "manual command"

    ManualOverrideAck:
      type: object
      properties:
        nodeId: { type: string }
        message: { type: string, example: "manual-override-activated" }
      required: [ nodeId, message ]

    NodeResponse:
      type: object
      properties:
        nodeId: { type: string }
        message: { type: string }


    NodeRegisteredResponse:
      type: object
      required: [ nodeId, message, assignedTopics ]
      properties:
        nodeId: { type: string, description: "Unique ID of the node.", example: "node_ab12cd34ef" }
        message: { type: string, example: "created" }
        assignedTopics:
          $ref: '#/components/schemas/AssignedTopics'

    AssignedTopics:
      type: object
      required: [ publish, subscribe ]
      description: MQTT topics automatically assigned by node-service at registration time.
      properties:
        publish:
          type: array
          items: { type: string }
        subscribe:
          type: array
          items: { type: string }

    NodeHistory:
      type: object
      properties:
        timestamp: { $ref: '#/components/schemas/Timestamp' }
        event: { type: string }
        changedBy: { type: string }
        details:
          type: array
          items: { type: string }

    NodeListResponse:
      type: object
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/NodeDetails' }

    NodeRegistrationHistoryResponse:
      type: object
      properties:
        history:
          type: array
          items: { $ref: '#/components/schemas/NodeHistory' }

    Heartbeat:
      type: object
      properties:
        nodeId: { type: string }
        timestamp: { $ref: '#/components/schemas/Timestamp' }
        status: { $ref: '#/components/schemas/StatusNodeValue' }
        batteryLevel: { type: integer }
        signalStrength: { type: integer }
        temperature: { type: number }

    HeartbeatBasic:
      type: object
      properties:
        timestamp: { $ref: '#/components/schemas/Timestamp' }
        status: { $ref: '#/components/schemas/StatusNodeValue' }
        batteryLevel: { type: integer }
        signalStrength: { type: integer }
        temperature: { type: number }

    HeartbeatListResponse:
      type: object
      required: [ data ]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Heartbeat'

    HeartbeatHistoryResponse:
      type: object
      properties:
        nodeId:
          type: string
          example: "node_ab12cd34ef"
        data:
          type: array
          items:
            $ref: '#/components/schemas/HeartbeatBasic'

    HeartbeatSubmitRequest:
      type: object
      additionalProperties: false
      properties:
        status: { $ref: '#/components/schemas/StatusNodeValue' }
        batteryLevel: { type: integer }
        signalStrength: { type: integer }
        temperature: { type: number }
        timestamp: { $ref: '#/components/schemas/Timestamp' }
      required: [ status ]

    HeartbeatAck:
      type: object
      properties:
        status: { type: string, example: "ok" }
        id: { type: string, description: "Internal heartbeat record ID" }
        receivedAt: { $ref: '#/components/schemas/Timestamp' }
      required: [ status, id, receivedAt ]
      example:
        status: ok
        id: hb_01JFQ8E6E9ZP5X6N9K2Q8C
        receivedAt: "2026-04-09T12:00:00Z"

    DataAck:
      type: object
      properties:
        status: { type: string, example: "ok" }
        id: { type: string, description: "Internal record ID" }
        receivedAt: { $ref: '#/components/schemas/Timestamp' }
      required: [ status, id, receivedAt ]
      example:
        status: ok
        id: rec_01JFQ8E6E9ZP5X6N9K2Q8C
        receivedAt: "2025-09-10T10:15:12Z"

    ScalarIn:
      type: object
      additionalProperties: false
      properties:
        sensorId: { type: string, description: "Optional sensor discriminator within the node" }
        value: { type: number, description: "Numeric value" }
        timestamp:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: "Optional measurement timestamp; if omitted in MQTT ingestion, the platform may use ingestion time."
      required: [ value ]

    SpatialIn:
      type: object
      additionalProperties: false
      properties:
        sensorId: { type: string, description: "Optional sensor discriminator within the node" }
        x: { type: number }
        y: { type: number }
        z: { type: number }
        timestamp:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: "Optional measurement timestamp; if omitted in MQTT ingestion, the platform may use ingestion time."
      required: [ x, y, z ]

    VectorIn:
      type: object
      additionalProperties: false
      properties:
        sensorId: { type: string, description: "Optional sensor discriminator within the node" }
        vector:
          type: array
          items: { type: number }
        timestamp:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: "Optional measurement timestamp; if omitted in MQTT ingestion, the platform may use ingestion time."
      required: [ vector ]

    TemporalIn:
      type: object
      additionalProperties: false
      properties:
        sensorId: { type: string, description: "Optional sensor discriminator within the node" }
        series:
          type: array
          items:
            type: object
            properties:
              timestamp: { $ref: '#/components/schemas/Timestamp' }
              value: { type: number }
            required: [ timestamp, value ]
      required: [ series ]

    MultimediaIn:
      type: object
      additionalProperties: false
      properties:
        sensorId:
          type: string
          description: Optional sensor discriminator within the node
        file:
          type: string
          format: binary
          description: Media file (photo/video)

    LatestData:
      type: object
      description: Latest datapoint wrapper returned by the data-service.
      properties:
        payload:
          type: object
          additionalProperties: true
      required: [ payload ]
      example:
        payload:
          value: 23.4
          sensorId: "temp-1"
          timestamp: "2026-03-26T10:15:30Z"
          _type: "scalar"
          _receivedAt: "2026-03-26T10:15:31Z"

    QueryResult:
      type: object
      description: Query results for non-media types.
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              nodeId: { type: string }
              type: { type: string }
              receivedAt: { $ref: '#/components/schemas/Timestamp' }
              payload:
                type: object
                additionalProperties: true
            required: [ id, nodeId, type, receivedAt, payload ]
      required: [ data ]
      example:
        data:
          - id: "rec_01JFQ8E6E9ZP5X6N9K2Q8C"
            nodeId: "node_ab12cd34ef"
            type: "scalar"
            receivedAt: "2026-03-26T10:15:31Z"
            payload:
              value: 22.9
              sensorId: "temp-1"
              timestamp: "2026-03-26T10:15:30Z"
          - id: "rec_01JFQ8E6E9ZP5X6N9K2Q8D"
            nodeId: "node_ab12cd34ef"
            type: "scalar"
            receivedAt: "2026-03-26T10:16:31Z"
            payload:
              value: 23.1
              sensorId: "temp-1"
              timestamp: "2026-03-26T10:16:30Z"

    DataMediaLinks:
      type: object
      properties:
        downloadUrl: { type: string, example: "/api/v1/iot/media/m_01JFQ9Y2T5K9X3/download" }
        thumbnailUrl: { type: string, nullable: true, example: "/api/v1/iot/media/m_01JFQ9Y2T5K9X3/thumbnail" }

    DataMediaObject:
      type: object
      properties:
        id: { type: string }
        nodeId: { type: string }
        fileName: { type: string }
        mimeType: { type: string, nullable: true }
        size: { type: integer, format: int64, nullable: true }
        checksum: { type: string, nullable: true }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        duration: { type: number, nullable: true }
        labels:
          type: array
          items: { type: string }
        links:
          $ref: '#/components/schemas/DataMediaLinks'
        thumbnail:
          type: string
          nullable: true
      required: [ id, nodeId, fileName, createdAt, labels, links ]

    DataMediaPageInfo:
      type: object
      properties:
        hasNextPage: { type: boolean }
        nextCursor: { type: string, nullable: true }
      required: [ hasNextPage ]

    DataMediaList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DataMediaObject' }
        pageInfo:
          $ref: '#/components/schemas/DataMediaPageInfo'
      required: [ items, pageInfo ]
      example:
        items:
          - id: "m_01JFQ9Y2T5K9X3"
            nodeId: "abc123"
            fileName: "photo_2025-09-10_10-00-00.jpg"
            mimeType: "image/jpeg"
            size: 2459136
            createdAt: "2025-09-10T10:00:00Z"
            width: 320
            height: 213
            labels: []
            links:
              downloadUrl: "/api/v1/iot/media/m_01JFQ9Y2T5K9X3/download"
              thumbnailUrl: "/api/v1/iot/media/m_01JFQ9Y2T5K9X3/thumbnail"
            thumbnail: "thumb_01JFQ9Y2T5K9X3"
        pageInfo:
          hasNextPage: true
          nextCursor: "2025-09-10T10:10:00Z"

    MediaObject:
      type: object
      properties:
        id: { type: string }
        nodeId: { type: string }
        fileName: { type: string }
        mimeType: { type: string }
        size: { type: integer, format: int64 }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        width: { type: integer, description: "Pixels (if image/video has dimensions)" }
        height: { type: integer, description: "Pixels" }
        links:
          type: object
          properties:
            downloadUrl: { type: string }
            thumbnailUrl: { type: string, nullable: true }
      required: [ id, nodeId, fileName, mimeType, size, createdAt, links ]

    MediaMetadataItem:
      type: object
      properties:
        mediaId: { type: string }
        nodeId: { type: string }
        filename: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        bucket: { type: string }
        etag: { type: string }
        thumbnailMediaId: { type: string, nullable: true }
        thumbnailContentType: { type: string, nullable: true }
        thumbnailSize: { type: integer, format: int64, nullable: true }
        thumbnailWidth: { type: integer, nullable: true }
        thumbnailHeight: { type: integer, nullable: true }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
      required: [ mediaId, nodeId, filename, contentType, size, bucket, etag, createdAt, updatedAt ]

    MediaMetadataListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/MediaMetadataItem' }
        page:
          type: integer
        size:
          type: integer
      required: [ data, page, size ]
      example:
        data:
          - mediaId: "m_01JFQ9Y2T5K9X3"
            nodeId: "abc123"
            filename: "photo_2025-09-10_10-00-00.jpg"
            contentType: "image/jpeg"
            size: 2459136
            bucket: "artemis-media"
            etag: "etag-1"
            thumbnailMediaId: "thumb_01JFQ9Y2T5K9X3"
            thumbnailContentType: "image/jpeg"
            thumbnailSize: 48123
            createdAt: "2025-09-10T10:00:00Z"
            updatedAt: "2025-09-10T10:00:05Z"
            thumbnailWidth: 320
            thumbnailHeight: 213
        page: 0
        size: 50

    MediaUploadResponse:
      type: object
      properties:
        uploaded: { type: boolean }
        mediaId: { type: string }
        nodeId: { type: string, nullable: true }
        fileName: { type: string }
        mimeType: { type: string }
        filename: { type: string }
        size: { type: integer, format: int64 }
        contentType: { type: string }
        bucket: { type: string }
        etag: { type: string }
        thumbnailMediaId: { type: string, nullable: true }
        thumbnailContentType: { type: string, nullable: true }
        thumbnailSize: { type: integer, format: int64, nullable: true }
        thumbnailWidth: { type: integer, nullable: true }
        thumbnailHeight: { type: integer, nullable: true }
      required: [ uploaded, mediaId, fileName, mimeType, filename, size, contentType, bucket, etag ]

    MediaExportRequest:
      type: object
      properties:
        nodeId: { type: string, example: "node_ab12cd34ef" }
        startTime: { $ref: '#/components/schemas/Timestamp' }
        endTime: { $ref: '#/components/schemas/Timestamp' }
        mime: { type: string, example: "image/*" }
        format:
          type: string
          description: Archive format.
          enum: [ zip, tar ]
          default: zip
      additionalProperties: false

    MediaExportStatus:
      type: object
      properties:
        exportId: { type: string }
        status:
          type: string
          enum: [ pending, running, done, error ]
        downloadUrl:
          type: string
          description: "Relative download URL. Present only when status=done."
        error:
          type: string
          description: "Error message when status=error."
      required: [ exportId, status ]
      example:
        exportId: "ex_01JFQA6V7F3S9DNQ4C5"
        status: "done"
        downloadUrl: "/api/v1/iot/media/exports/ex_01JFQA6V7F3S9DNQ4C5/download"
    
    DecisionAction:
      type: object
      properties:
        actuatorId: { type: string }
        commandType:
          $ref: '#/components/schemas/CommandType'
        state:
          allOf:
            - $ref: '#/components/schemas/ActuatorState'
          nullable: true
          description: Only used if commandType is setState
        value:
          type: number
          nullable: true
          description: Only used if commandType is setValue
        payload:
          type: object
          additionalProperties: true
          nullable: true
      oneOf:
        - required: [ actuatorId, commandType, state ]
          properties:
            commandType:
              type: string
              enum: [ setState ]
        - required: [ actuatorId, commandType, value ]
          properties:
            commandType:
              type: string
              enum: [ setValue ]

    DecisionSensorRef:
      type: object
      properties:
        alias: { type: string }
        nodeId: { type: string }
        sensorId: { type: string }

    DecisionActuatorRef:
      type: object
      properties:
        nodeId: { type: string }
        actuatorName: { type: string }

    DecisionRuleSchedule:
      type: object
      properties:
        cron: { type: string, nullable: true }
        intervalSeconds: { type: integer, format: int64, nullable: true }

    DecisionRuleEvaluationMethod:
      type: string
      enum: [ expression, externalService, undefined ]

    DecisionRuleTriggerType:
      type: string
      enum: [ manual, temporal, event ]
    
    DecisionRule:
      type: object
      properties:
        ruleId:
          type: string
          example: "rule-0001"
        description: { type: string, description: "Brief description of the rule." }
        triggerType:
          $ref: '#/components/schemas/DecisionRuleTriggerType'
        schedule:
          $ref: '#/components/schemas/DecisionRuleSchedule'
        eventSource:
          type: string
        evaluationMethod:
          $ref: '#/components/schemas/DecisionRuleEvaluationMethod'
        expression:
          type: string
          description: "Logical condition that triggers the rule."
          example: "(H1 + H2)/2 > 60 && T1 < 22"
        externalServiceUrl: { type: string, description: "External service URL that triggers the rule." }
        variables:
          type: object
          additionalProperties:
            type: string
          description: "Map of variable alias to actual sensor IDs."
          example:
            H1: "sensor-humidity-001"
            H2: "sensor-humidity-002"
            T1: "sensor-temperature-001"
        sensors:
          type: array
          items:
            $ref: '#/components/schemas/DecisionSensorRef'
        actuators:
          type: array
          items:
            $ref: '#/components/schemas/DecisionActuatorRef'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/DecisionAction'

    DecisionRuleRequest:
      type: object
      additionalProperties: false
      properties:
        description: { type: string, description: "Brief description of the rule." }
        triggerType:
          $ref: '#/components/schemas/DecisionRuleTriggerType'
        schedule:
          $ref: '#/components/schemas/DecisionRuleSchedule'
        eventSource:
          type: string
        evaluationMethod:
          $ref: '#/components/schemas/DecisionRuleEvaluationMethod'
        expression:
          type: string
          description: "Logical condition that triggers the rule."
          example: "(H1 + H2)/2 > 60 && T1 < 22"
        externalServiceUrl: { type: string, description: "External service URL that triggers the rule." }
        variables:
          type: object
          additionalProperties:
            type: string
          description: "Map of variable alias to actual sensor IDs."
          example:
            H1: "sensor-humidity-001"
            H2: "sensor-humidity-002"
            T1: "sensor-temperature-001"
        sensors:
          type: array
          items:
            $ref: '#/components/schemas/DecisionSensorRef'
        actuators:
          type: array
          items:
            $ref: '#/components/schemas/DecisionActuatorRef'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/DecisionAction'

    DecisionRuleListResponse:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/DecisionRule'
    
    CommandType:
      type: string
      description: "The abstract command to be executed."
      enum: [ setState, setValue ]

    ActuatorState:
      type: string
      description: "The target binary state for a setState command."
      enum: [ on, off ]

    Commands:
      type: object
      properties:
        issuedBy:
          type: string
          example: "user-0001"
        commandType:
          $ref: '#/components/schemas/CommandType'
        state:
          allOf:
            - $ref: '#/components/schemas/ActuatorState'
          description: Only used if commandType is setState
          example: on
        value:
          type: number
          description: Only used if commandType is setValue
          example: 75
        unit:
          type: string
          example: "%"
        payload:
          type: object
          description: "Optional structured command payload."
          additionalProperties: true
        reason:
          type: string
          example: "Partial activation due to ventilation regulation"
        message:
          type: string
          example: "Command delivered"
        timestamp:
          $ref: '#/components/schemas/Timestamp'
      oneOf:
        - required: [ commandType, state ]
          properties:
            commandType:
              type: string
              enum: [ setState ]
        - required: [ commandType, value ]
          properties:
            commandType:
              type: string
              enum: [ setValue ]

    CommandsRequest:
      type: object
      additionalProperties: false
      properties:
        commandType:
          $ref: '#/components/schemas/CommandType'
        state:
          allOf:
            - $ref: '#/components/schemas/ActuatorState'
          description: Only used if commandType is setState
          example: on
        value:
          type: number
          description: Only used if commandType is setValue
          example: 75
        unit:
          type: string
          example: "%"
        payload:
          type: object
          description: "Optional structured command payload."
          additionalProperties: true
        reason:
          type: string
          example: "Partial activation due to ventilation regulation"
        timestamp:
          $ref: '#/components/schemas/Timestamp'
      oneOf:
        - required: [ commandType, state ]
          properties:
            commandType:
              type: string
              enum: [ setState ]
        - required: [ commandType, value ]
          properties:
            commandType:
              type: string
              enum: [ setValue ]

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'

    DiscoveryLink:
      type: object
      required: [ href ]
      properties:
        href:
          type: string
          description: "Relative or absolute URL."

    DiscoveryVersion:
      type: object
      required: [ version, status, path ]
      properties:
        version:
          type: string
          example: "v1"
        status:
          type: string
          description: "Version status."
          enum: [ current, future, beta, deprecated ]
          example: current
        path:
          type: string
          example: "/api/v1"

    DiscoveryDocument:
      type: object
      required: [ name, description, status, versions, links ]
      properties:
        name:
          type: string
          example: "ARTEMIS Platform API"
        description:
          type: string
          example: "API for managing digital twins, nodes, and IoT data."
        status:
          type: string
          description: "Overall platform status."
          enum: [ active, maintenance, deprecated ]
          example: active
        versions:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryVersion'
        links:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DiscoveryLink'

    CredentialsEnrollmentCreateRequest:
      type: object
      required: [ nodesId ]
      additionalProperties: false
      properties:
        ttlSeconds:
          type: integer
          format: int32
          minimum: 3600
          maximum: 864000
          description: Code validity in seconds.
        replaceOld:
          type: boolean
        graceSeconds:
          type: integer
          format: int32
          minimum: 0
        nodesId:
          type: array
          description: "List of nodeId for which a enrollment code (for each nodeId) is requested, max 100 nodes per request"
          maxItems: 100
          example:
            - "node_ab12cd34ef"
            - "node_7k2m9q4x1p"
            - "node_m4z8c1q2wr"
          items:
            type: string

    CredentialsEnrollmentCreateResponse:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        enrollments:
          type: array
          items:
            type: object
            properties:
              nodeId:
                type: string
              enrollmentId:
                type: string
              enrollmentCode:
                type: string
                description: One-time code (shown once)
      example:
        createdAt: "2025-12-17T10:15:00Z"
        expiresAt: "2025-12-17T10:45:00Z"
        enrollments:
          - nodeId: "node_ab12cd34ef"
            enrollmentId: "enr_2f5c8c0b"
            enrollmentCode: "K4R9-3Q1Z-7P8M"
          - nodeId: "node_7k2m9q4x1p"
            enrollmentId: "enr_8a0d1c77"
            enrollmentCode: "A1B2-C3D4-E5F6"

    CredentialsEnrollRequest:
      type: object
      required: [ enrollmentCode ]
      additionalProperties: false
      properties:
        enrollmentCode:
          type: string
          description: One-time bootstrap enrollment code issued by `/credentials/enroll/code`
      example:
        enrollmentCode: "K4R9-3Q1Z-7P8M"

    CredentialsCertificateResponse:
      type: object
      required: [ nodeId, certificatePem, certificateChainPem, expiresAt ]
      properties:
        nodeId:
          type: string
        privateKeyPem:
          type: string
          nullable: true
          description: |
            Device private key in PEM format.
            Returned during bootstrap enrollment and renewal flows.
        certificatePem:
          type: string
          description: Client certificate in PEM format
        certificateChainPem:
          type: string
          description: Certificate chain (including issuing CA) in PEM format
        expiresAt:
          type: string
          format: date-time
      example:
        nodeId: "node_ab12cd34ef"
        privateKeyPem: |
          -----BEGIN PRIVATE KEY-----
          MIGH...snip...==
          -----END PRIVATE KEY-----
        certificatePem: |
          -----BEGIN CERTIFICATE-----
          MIIC...snip...AB
          -----END CERTIFICATE-----
        certificateChainPem: |
          -----BEGIN CERTIFICATE-----
          MIIC...snip...CA
          -----END CERTIFICATE-----
          -----BEGIN CERTIFICATE-----
          MIIC...snip...ROOT
          -----END CERTIFICATE-----
        expiresAt: "2026-12-17T10:15:00Z"

    CredentialsRenewRequest:
      type: object
      required: [ previousCertificatePem ]
      additionalProperties: false
      properties:
        previousCertificatePem:
          type: string
          description: Previously issued client certificate in PEM format
      example:
        previousCertificatePem: |
          -----BEGIN CERTIFICATE-----
          MIIC...snip...AB
          -----END CERTIFICATE-----

    ProblemDetails:
      type: object
      additionalProperties: true
      required: [type, title, status, timestamp]
      properties:
        type:
          type: string
          format: uri
          description: Machine-readable error type URI
        title:
          type: string
          description: Short, human-readable summary
        status:
          type: integer
          format: int32
        detail:
          type: string
          description: Human-readable explanation
        instance:
          type: string
          format: uri
          description: URI reference identifying the specific occurrence
        errorCode:
          type: string
          description: Stable application error code
        timestamp:
          type: string
          format: date-time
          description: Error occurrence timestamp

  ###########################################################
  # Responses
  ###########################################################
  responses:
    BadRequest:
      description: Invalid request (e.g., missing/invalid `type` for submit/query, invalid content type).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Forbidden:
      description: Authenticated but not permitted to access this resource.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    NotFound:
      description: Resource not found (e.g., node or media).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Conflict:
      description: Conflict (e.g., duplicate detected when using idempotency/checksum).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Unprocessable:
      description: Invalid or missing required parameters/body fields.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    ServerError:
      description: Server error.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    ServiceUnavailable:
      description: Service overloaded or temporarily unavailable.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    ProblemResponse:
      description: Error response in RFC7807 format
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
