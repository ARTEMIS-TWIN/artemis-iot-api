openapi: 3.0.0
info:
  title: ARTEMIS Gateway API
  version: "2.0.0"
  description: |
    APIs exposed by the Gateway for the ARTEMIS domain. The Gateway validates access, control access roles, forwards requests to microservices via mTLS.
      

servers:
  - url: /api/v1/iot
    description: ARTEMIS API Base Path (recommended).
  - url: /
    description: Root for discovery and administrative endpoints (e.g., /api, /internal).

tags:
  - name: Node Presentation & Registration
    description: |
      Lifecycle of nodes (sensors/actuators): registration, updates, listing and search.
      
  
  - name: Node Heartbeat
    description: |
      Heartbeat ingestion and history.
      

  - name: Data
    description: |
      Data ingestion (scalar, spatial, vector, temporal, multimedia) and querying.
      
  
  - name: Media
    description: |
      Media listing, download, thumbnails, and exports.


  - name: Decision Rules
    description: |
      Create, update, list and delete complex rules for automation.


  - name: Actuator Commands
    description: | 
      Send manual commands to actuators and read the last command.


  - name: Enrollment & Device Credentials
    description: |
      Device provisioning using one-time codes and credential management.

  - name: Discovery
    description: |
      OpenAPI discovery metadata and useful links.

security:
  - bearerIndigo: [ ]

paths: ###########################################################
  # Node Presentation & Registration
  ###########################################################
  /nodes:
    post:
      tags: [ Node Presentation & Registration ]
      summary: Register a New Node / Create a New Device
      description: "Registers a new sensor/actuator node, creates its entry in the administrative database, and automatically assigns MQTT topics server-side."
      security: [ { bearerIndigo: [ ] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NodeDetailsRequest' }
            example:
              name: "HumiditySensorNode"
              owner: "team-iot"
              type: "sensor"
              location:
                latitude: 40.350
                longitude: 18.175
                altitude: 12.0
                position:
                  floor: 1
                  room: "the room name"
                  x: 1
                  y: 5
                  z: 3
                indoor: true
                installationPoint: "Crypt ceiling vault"
              capabilities:
                sensors:
                  - sensorId: "hum-001"
                    name: "hum-001"
                    type: "humidity"
                    dataType: "scalar"
                    unit: "%"
                    range: [ 0, 100 ]
                actuators: [ ]
                supportedDataTypes: [ "scalar" ]
              rhdtId: "rhdt-001"
              status: "active"
              enabled: true
              simulatedNode: false
              manufacturer: "IoTTech srl"
              firmwareVersion: "1.2.3"
              installationTimestamp: "2025-09-10T10:15:12Z"
              operationalFlags:
                isCalibrated: true
                maintenanceRequired: false
                manualOverrideActive: false
                manualOverrideBy: ""
                manualOverrideAt: null
              metadata: {}
      responses:
        '201':
          description: "Node successfully registered."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeRegisteredResponse' }
        '400':
          description: Invalid request (validation failed or malformed payload).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
              examples:
                validationFailed:
                  summary: Validation failed
                  value:
                    type: "urn:artemis:error:validation"
                    title: "Bad Request"
                    status: 400
                    detail: "name must not be blank"
                    instance: "/api/v1/iot/nodes"
                    errorCode: "VALIDATION_ERROR"
                    timestamp: "2026-05-28T18:00:00Z"
                domainError:
                  summary: Domain exception
                  value:
                    type: "urn:artemis:error:400"
                    title: "Bad Request"
                    status: 400
                    detail: "Invalid node data"
                    instance: "/api/v1/iot/nodes"
                    errorCode: "HTTP_400"
                    timestamp: "2026-05-28T18:00:00Z"
        '409':
          description: Conflict (node already exists for the given location, rhdtId and type).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
              examples:
                nodeAlreadyExists:
                  summary: Node already exists
                  value:
                    type: "urn:artemis:error:409"
                    title: "Conflict"
                    status: 409
                    detail: "Node already exists: node_ab12cd34ef"
                    instance: "/api/v1/iot/nodes"
                    errorCode: "HTTP_409"
                    timestamp: "2026-05-28T18:00:00Z"
        '500':
          description: Server error (could not generate a unique nodeId).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
              examples:
                nodeIdGenerationFailed:
                  summary: Could not generate a unique nodeId
                  value:
                    type: "urn:artemis:error:500"
                    title: "Internal Server Error"
                    status: 500
                    detail: "Could not generate a unique nodeId"
                    instance: "/api/v1/iot/nodes"
                    errorCode: "HTTP_500"
                    timestamp: "2026-05-28T18:00:00Z"
    get:
      tags: [ Node Presentation & Registration ]
      summary: List and filter all Registered Nodes
      description: "Retrieves a list of all nodes registered, with summary information. Supports filtering of nodes by type, room, capabilities, etc."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - name: rhdtId
          in: query
          description: "Filter by RHDT identifier."
          schema: { type: string }
          example: "rhdt-001"
          required: false
        - name: owner
          in: query
          description: "Filter by node owner."
          schema: { type: string }
          example: "owner-a"
          required: false
        - name: type
          in: query
          description: "Filter by node type."
          schema:
            type: string
            enum: [ sensor, actuator, hybrid ]
          example: "sensor"
          required: false
        - name: room
          in: query
          description: "Filter by room or installation area."
          schema:
            type: string
          example: "room-1"
          required: false
        - name: status
          in: query
          description: "Filter by node status."
          schema:
            $ref: '#/components/schemas/StatusNodeValue'
          example: "active"
          required: false
        - name: enabled
          in: query
          description: "Filter by enabled flag."
          schema: { type: boolean }
          required: false
        - name: simulatedNode
          in: query
          description: "Filter by simulated node flag."
          schema: { type: boolean }
          required: false
        - name: manufacturer
          in: query
          description: "Filter by manufacturer."
          schema: { type: string }
          example: "ARTEMIS"
          required: false
        - name: firmwareVersion
          in: query
          description: "Filter by firmware version."
          schema: { type: string }
          example: "1.0.0"
          required: false
        - name: registeredFrom
          in: query
          description: "Include nodes registered at or after this timestamp."
          schema: { $ref: '#/components/schemas/Timestamp' }
          required: false
        - name: registeredTo
          in: query
          description: "Include nodes registered at or before this timestamp."
          schema: { $ref: '#/components/schemas/Timestamp' }
          required: false
        - name: nodeIds
          in: query
          description: "Filter by a set of node identifiers."
          required: false
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
      responses:
        '200':
          description: "Search results returned."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeListResponse' }
              example:
                nodes:
                  - nodeId: "node-001"
                    name: "HumiditySensorNode"
                    owner: "team-iot"
                    type: "sensor"
                    location:
                      latitude: 40.350
                      longitude: 18.175
                      altitude: 12.0
                      position:
                        floor: 1
                        room: "the room name"
                        x: 1
                        y: 5
                        z: 3
                      indoor: true
                      installationPoint: "Crypt ceiling vault"
                    capabilities:
                      sensors:
                        - sensorId: "hum-001"
                          name: "hum-001"
                          type: "humidity"
                          dataType: "scalar"
                          unit: "%"
                          range: [ 0, 100 ]
                      actuators: [ ]
                      supportedDataTypes: [ "scalar" ]
                      mqttTopics:
                        publish:
                          - "artemis/nodes/node-001/heartbeat"
                          - "artemis/nodes/node-001/data"
                        subscribe:
                          - "artemis/nodes/node-001/commands"
                    rhdtId: "rhdt-001"
                    status: "active"
                    enabled: true
                    simulatedNode: false
                    manufacturer: "IoTTech srl"
                    firmwareVersion: "1.2.3"
                    installationTimestamp: "2025-09-10T10:15:12Z"
                    registrationTimestamp: "2025-09-10T10:15:12Z"
                    operationalFlags:
                      isCalibrated: true
                      maintenanceRequired: false
                      manualOverrideActive: false
                      manualOverrideBy: ""
                      manualOverrideAt: null
                    metadata: {}
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}:
    get:
      tags: [ Node Presentation & Registration ]
      summary: Get Node Details
      description: "Returns complete details of a specific node."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "Node details successfully returned."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeDetails' }
              example:
                nodeId: "node-001"
                name: "HumiditySensorNode"
                owner: "team-iot"
                type: "sensor"
                location:
                  latitude: 40.350
                  longitude: 18.175
                  altitude: 12.0
                  position:
                    floor: 1
                    room: "the room name"
                    x: 1
                    y: 5
                    z: 3
                  indoor: true
                  installationPoint: "Crypt ceiling vault"
                capabilities:
                  sensors:
                    - sensorId: "hum-001"
                      name: "hum-001"
                      type: "humidity"
                      dataType: "scalar"
                      unit: "%"
                      range: [ 0, 100 ]
                  actuators: [ ]
                  supportedDataTypes: [ "scalar" ]
                  mqttTopics:
                    publish:
                      - "artemis/nodes/node-001/heartbeat"
                      - "artemis/nodes/node-001/data"
                    subscribe:
                      - "artemis/nodes/node-001/commands"
                rhdtId: "rhdt-001"
                status: "active"
                enabled: true
                simulatedNode: false
                manufacturer: "IoTTech srl"
                firmwareVersion: "1.2.3"
                installationTimestamp: "2025-09-10T10:15:12Z"
                registrationTimestamp: "2025-09-10T10:15:12Z"
                operationalFlags:
                  isCalibrated: true
                  maintenanceRequired: false
                  manualOverrideActive: false
                  manualOverrideBy: ""
                  manualOverrideAt: null
                metadata: {}
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    put:
      tags: [ Node Presentation & Registration ]
      summary: Update Node Information
      description: "Updates information of an existing node (name, location, metadata...)."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - $ref: '#/components/parameters/XOwner'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateNodeInformationRequest' }
            example:
              description: "Room change"
              node:
                name: "HumiditySensorNode-WestWing"
                type: "sensor"
                location:
                  latitude: 40.351
                  longitude: 18.176
                  altitude: 12.0
                  position:
                    floor: 1
                    room: "west wing"
                    x: 2
                    y: 6
                    z: 3
                  indoor: true
                  installationPoint: "West wing ceiling vault"
                enabled: true
                simulatedNode: false
                operationalFlags:
                  isCalibrated: true
                  maintenanceRequired: false
                  manualOverrideActive: false
                  manualOverrideBy: ""
                  manualOverrideAt: null
                metadata:
                  maintenanceWindow: "2025-Q4"
      responses:
        '200':
          description: "Node successfully updated."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeResponse' }
              example:
                nodeId: "node-001"
                message: "updated"
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      tags: [ Node Presentation & Registration ]
      summary: Delete a Node
      description: "Removes a sensor/actuator node from the system."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - name: mqttUnsubscribe
          in: query
          required: true
          description: Unsubscribed from the broker, if topics are not reused (default=true)
          schema:
            type: boolean
            default: true
      responses:
        '204': { description: "Node successfully deleted. No content returned." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/registrationHistory:
    get:
      tags: [ Node Presentation & Registration ]
      summary: Get Registration History
      description: "Returns the audit log of a node's registrations and modifications."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "Registration history successfully returned."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeRegistrationHistoryResponse' }
              example:
                history:
                  - timestamp: "2025-09-10T10:15:12Z"
                    event: "registered"
                    changedBy: "team-iot"
                    details:
                      - "Node created"
                      - "MQTT topics assigned"
                  - timestamp: "2025-10-01T08:30:00Z"
                    event: "updated"
                    changedBy: "team-iot"
                    details:
                      - "Room changed to west wing"
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/manual-override/activate:
    post:
      tags: [ Node Presentation & Registration ]
      summary: Activate manual override
      description: "Node-service endpoint. Activates manual override for the node and persists the updated operational flags."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - $ref: '#/components/parameters/XOwner'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ManualOverrideRequest' }
            example:
              reason: "manual inspection in progress"
      responses:
        '200':
          description: "Manual override activated."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ManualOverrideAck' }
              example:
                nodeId: "node-001"
                message: "manual-override-activated"
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/manual-override/deactivate:
    post:
      tags: [ Node Presentation & Registration ]
      summary: Deactivate manual override
      description: "Node-service endpoint. Deactivates manual override for the node and persists the updated operational flags."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - $ref: '#/components/parameters/XOwner'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ManualOverrideRequest' }
            example:
              reason: "inspection completed"
      responses:
        '200':
          description: "Manual override deactivated."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ManualOverrideAck' }
              example:
                nodeId: "node-001"
                message: "manual-override-deactivated"
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  ###########################################################
  # Node Heartbeat
  ###########################################################
  /nodes/heartbeat:
    get:
      tags: [ Node Heartbeat ]
      summary: Get Last Known Heartbeat For All Nodes
      description: "Provides the last known heartbeat for all nodes in scope."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/StatusNodeValue'
        - $ref: '#/components/parameters/BatteryLevelValue'
        - $ref: '#/components/parameters/SignalStrengthValue'
        - $ref: '#/components/parameters/TemperatureValue'
      responses:
        '200':
          description: "Heartbeat list successfully returned."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HeartbeatListResponse' }
              example:
                data:
                  - nodeId: "node-001"
                    timestamp: "2025-09-10T10:15:12Z"
                    status: "active"
                    batteryLevel: 87
                    signalStrength: 78
                    temperature: 23.5
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/heartbeat:
    post:
      tags: [ Node Heartbeat ]
      summary: Submit Heartbeat
      description: "Submits a heartbeat for a specific node via HTTP as an alternative to the MQTT/RabbitMQ ingestion path."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HeartbeatSubmitRequest' }
            example:
              status: "active"
              batteryLevel: 87
              signalStrength: 78
              temperature: 23.5
              timestamp: "2025-09-10T10:15:12Z"
      responses:
        '201':
          description: "Heartbeat successfully stored."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HeartbeatAck' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
    get:
      tags: [ Node Heartbeat ]
      summary: Get Last Known Heartbeat
      description: "Returns the timestamp of the last heartbeat signal received from a specific node."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "Last heartbeat successfully returned."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Heartbeat' }
              example:
                nodeId: "node-001"
                timestamp: "2025-09-10T10:15:12Z"
                status: "active"
                batteryLevel: 87
                signalStrength: 78
                temperature: 23.5
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/heartbeat/history:
    get:
      tags: [ Node Heartbeat ]
      summary: Get Heartbeat History
      description: "Provides the history of heartbeat signals for a specific node."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - name: limit
          in: query
          required: false
          description: "Maximum number of heartbeat records returned. Defaults to 100."
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: "Number of heartbeat records skipped before collecting the response page."
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: "Heartbeat history successfully returned."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HeartbeatHistoryResponse' }
              example:
                nodeId: "node-001"
                data:
                  - timestamp: "2025-09-10T10:15:12Z"
                    status: "active"
                    batteryLevel: 87
                    signalStrength: 78
                    temperature: 23.5
                  - timestamp: "2025-09-10T10:20:12Z"
                    status: "active"
                    batteryLevel: 86
                    signalStrength: 79
                    temperature: 23.3
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  ###########################################################
  # Data
  ###########################################################
  /nodes/{nodeId}/data:
    parameters:
      - $ref: '#/components/parameters/NodeId'
    get:
      tags: [ Data ]
      operationId: dataGet
      summary: Read operations via a single unified endpoint
      description: |
        - `op=latest` → returns the latest known data for the node (type-agnostic).
        - `op=query&type=...&startTime=...&endTime=...` → returns data filtered by type and time range.
      security:
        - bearerIndigo: [ ]
      parameters:
        - name: op
          in: query
          required: true
          description: Operation selector.
          schema:
            type: string
            enum: [ latest, query ]
        - name: type
          in: query
          required: false
          description: Data type. Required for `op=query`.
          schema:
            type: string
            enum: [ scalar, spatial, multimedia, vector, temporal ]
        - name: sensorId
          in: query
          required: false
          description: Optional sensor discriminator within the same node. Useful when one node exposes multiple sensors of the same data type.
          schema:
            type: string
        - name: startTime
          in: query
          required: false
          description: Start of the time range (only for `op=query`).
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: false
          description: End of the time range (only for `op=query`).
          schema:
            type: string
            format: date-time
        - name: pageSize
          in: query
          required: false
          description: Page size for `op=query&type=multimedia`.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: cursor
          in: query
          required: false
          description: Pagination cursor for `op=query&type=multimedia`.
          schema:
            type: string
        - name: mime
          in: query
          required: false
          description: MIME filter (e.g., `image/*`, `video/mp4`) for `op=query&type=multimedia`.
          schema:
            type: string
      responses:
        '200':
          description: Successful read response.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LatestData'
                  - $ref: '#/components/schemas/QueryResult'
                  - $ref: '#/components/schemas/DataMediaList'
              examples:
                latestScalar:
                  summary: Latest scalar datapoint
                  value:
                    payload:
                      value: 23.4
                      sensorId: "temp-1"
                      timestamp: "2026-03-26T10:15:30Z"
                      _type: "scalar"
                      _receivedAt: "2026-03-26T10:15:31Z"
                queryScalar:
                  summary: Time-range query result
                  value:
                    data:
                      - id: "rec_01JFQ8E6E9ZP5X6N9K2Q8C"
                        nodeId: "node-001"
                        type: "scalar"
                        receivedAt: "2026-03-26T10:15:31Z"
                        payload:
                          value: 22.9
                          sensorId: "temp-1"
                          timestamp: "2026-03-26T10:15:30Z"
                multimediaPage:
                  summary: Multimedia page
                  value:
                    items:
                      - id: "m_01JFQ9Y2T5K9X3"
                        nodeId: "node-001"
                        fileName: "photo_2025-09-10_10-00-00.jpg"
                        mimeType: "image/jpeg"
                        size: 2459136
                        createdAt: "2025-09-10T10:00:00Z"
                        width: 320
                        height: 213
                        labels: [ ]
                        links:
                          downloadUrl: "/api/v1/iot/media/m_01JFQ9Y2T5K9X3/download"
                          thumbnailUrl: "/api/v1/iot/media/m_01JFQ9Y2T5K9X3/thumbnail"
                        thumbnail: "thumb_01JFQ9Y2T5K9X3"
                    pageInfo:
                      hasNextPage: true
                      nextCursor: "2025-09-10T10:10:00Z"
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

    post:
      tags: [ Data ]
      operationId: dataSubmit
      summary: Submit data via a single unified endpoint
      description: |
        Select behavior using the query string:
        - `type=scalar`     → JSON { sensorId?, value, timestamp? }
        - `type=spatial`    → JSON { sensorId?, x, y, z, timestamp? }
        - `type=vector`     → JSON { sensorId?, vector: number[], timestamp? }
        - `type=temporal`   → JSON { sensorId?, series: [{ timestamp, value }, ...] }
        - `type=multimedia` → multipart/form-data with `file` (+ optional `sensorId`)
        
        If `type=multimedia`, the binary must be sent using `multipart/form-data`.
        The Data Service uploads the binary to the internal Media Service and then persists
        a multimedia data event linked to the node.
        Sending JSON with `type=multimedia` or missing `type` yields 400.
        
        Auth: device via mTLS OR user via JWT:
                  - If mTLS is used, nodeId MUST match the device certificate identity.
                  - If JWT is used, user must have permission on the node.
      security:
        - bearerIndigo: [ ]
        - mutualTLS: [ ]
      parameters:
        - name: type
          in: query
          required: true
          description: Data type.
          schema:
            type: string
            enum: [ scalar, spatial, multimedia, vector, temporal ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ScalarIn'
                - $ref: '#/components/schemas/SpatialIn'
                - $ref: '#/components/schemas/VectorIn'
                - $ref: '#/components/schemas/TemporalIn'
            examples:
              scalar:
                summary: Scalar payload
                value:
                  sensorId: "temp-1"
                  value: 23.4
                  timestamp: "2025-09-10T10:15:12Z"
              spatial:
                summary: Spatial payload
                value:
                  sensorId: "pos-1"
                  x: 1.0
                  y: 5.0
                  z: 3.0
                  timestamp: "2025-09-10T10:15:12Z"
              vector:
                summary: Vector payload
                value:
                  sensorId: "acc-1"
                  vector: [ 0.12, 0.03, 0.98 ]
                  timestamp: "2025-09-10T10:15:12Z"
              temporal:
                summary: Temporal payload
                value:
                  sensorId: "temp-1"
                  series:
                    - timestamp: "2025-09-10T10:10:12Z"
                      value: 22.8
                    - timestamp: "2025-09-10T10:15:12Z"
                      value: 23.4
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MultimediaIn'
            example:
              sensorId: "cam-1"
              file: "(binary)"
      responses:
        '201':
          description: Data created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataAck'
              examples:
                createdScalar:
                  summary: Created scalar datapoint
                  value:
                    status: ok
                    id: rec_01JFQ8E6E9ZP5X6N9K2Q8C
                    receivedAt: "2025-09-10T10:15:12Z"
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

    delete:
      tags: [ Data ]
      operationId: dataDelete
      summary: Delete node data by type and time range
      description: |
        Deletes data records for the specified node and type.
        If a time range is provided (startTime/endTime), only records
        whose timestamp falls within the range are deleted.
        If no time range is provided, *all* records of that type for the node are deleted.
        For `type=multimedia` (and `type=all` when multimedia records are involved),
        the service also triggers cleanup on the internal Media Service.
        
        This operation is intended for maintenance / cleanup / GDPR-like use cases
        and should be protected by strict authorization policies.
      security:
        - bearerIndigo: [ ]   # come gli altri endpoint Data
      parameters:
        - name: type
          in: query
          required: true
          description: Data type to delete.
          schema:
            type: string
            enum: [ scalar, spatial, vector, temporal, multimedia, all ]
        - name: startTime
          in: query
          required: false
          description: Start of time range (inclusive).
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: false
          description: End of time range (exclusive).
          schema:
            type: string
            format: date-time
        - name: dryRun
          in: query
          required: false
          description: |
            If true, no deletion is performed, only the estimated count of records
            that would be deleted is returned.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
                    description: "Number of records actually deleted."
                  type:
                    type: string
                    description: "Type of data affected."
                  nodeId:
                    type: string
                  dryRun:
                    type: boolean
              example:
                deletedCount: 42
                type: "scalar"
                nodeId: "node-001"
                dryRun: false
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/data/stream:
    get:
      tags: [ Data ]
      summary: Subscribe to Real-Time Data (SSE)
      description: >
        Opens a Server-Sent Events (SSE) stream to receive real-time data updates
        for the specified node. The service polls persisted node data and emits
        `node-data` events plus periodic keepalive comments.
      security:
        - bearerIndigo: [ ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - name: type
          in: query
          required: true
          description: Filter by data type (scalar, spatial, vector, temporal, multimedia).
          schema:
            type: string
            enum: [ scalar, spatial, vector, temporal, multimedia ]
        - name: since
          in: query
          required: false
          description: Emit only records received after this timestamp.
          schema:
            type: string
            format: date-time
        - name: pollMs
          in: query
          required: false
          description: Polling interval in milliseconds. Runtime minimum is 250.
          schema:
            type: integer
            default: 1000
            minimum: 250
      responses:
        '200':
          description: "SSE stream opened."
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: node-data
                  id: doc-1
                  data: {"type":"scalar","timestamp":"2026-03-26T10:00:01Z","payload":{"value":42.5,"sensorId":"sensor-1","timestamp":"2026-03-26T10:00:01Z"}}
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  ###########################################################
  # Media
  ###########################################################
  /internal/media:
    post:
      tags: [ Media ]
      summary: Internal - Create media object
      description: |
        Internal endpoint used by the Data Service to create a media object.
        It stores the binary file into MinIO (or equivalent object storage)
        and persists metadata into the `media` collection in MongoDB.
        
        Not exposed to external clients; protected by mTLS and service-to-service auth.
      servers:
        - url: /      # Media Service base path interno (es. http://media-service)
      security: [ ]     # protetto a livello di rete/mTLS, niente bearer pubblico
      parameters:
        - name: nodeId
          in: query
          required: true
          schema:
            type: string
          description: "ID of the originating node."
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [ file ]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Media file (photo/video/document)."
      responses:
        '201':
          description: "Media created."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
              example:
                uploaded: true
                mediaId: "m_01JFQ9Y2T5K9X3"
                nodeId: "node-001"
                fileName: "photo_2025-09-10_10-00-00.jpg"
                mimeType: "image/jpeg"
                filename: "photo_2025-09-10_10-00-00.jpg"
                size: 2459136
                contentType: "image/jpeg"
                bucket: "artemis-media"
                etag: "etag-1"
                thumbnailMediaId: "thumb_01JFQ9Y2T5K9X3"
                thumbnailContentType: "image/jpeg"
                thumbnailSize: 48123
                thumbnailWidth: 320
                thumbnailHeight: 213
        '400':
          description: "Invalid input or upload error."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: "Server error during upload or metadata persistence."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    
    delete:
      tags: [ Media ]
      summary: Internal - Bulk delete media by node and time range
      description: |
        Deletes media objects for a given node and optional time range.
        Used by the Data Service when processing DELETE /nodes/{nodeId}/data?type=multimedia.
        
        Not exposed externally.
      servers:
        - url: /
      security: [ ]
      parameters:
        - name: nodeId
          in: query
          required: true
          schema:
            type: string
          description: "Node ID whose media will be deleted."
        - name: startTime
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: "Start of time range (inclusive)."
        - name: endTime
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: "End of time range (exclusive)."
      responses:
        '200':
          description: "Bulk deletion summary."
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
                  nodeId:
                    type: string
                  startTime:
                    type: string
                    format: date-time
                  endTime:
                    type: string
                    format: date-time
              example:
                deletedCount: 12
                nodeId: "node-001"
                startTime: "2025-09-10T00:00:00Z"
                endTime: "2025-09-10T23:59:59Z"
        '400':
          description: "Invalid parameters."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: "Error during bulk deletion."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /internal/media/{mediaId}:
    get:
      tags: [ Media ]
      summary: Internal - Download single media object
