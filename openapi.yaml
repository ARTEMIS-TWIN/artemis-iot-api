          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: "Delete error (metadata or storage)."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              
