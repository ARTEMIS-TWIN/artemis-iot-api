    delete:
      tags: [ Media ]
      summary: Internal - Delete single media object
      description: |
        Internal endpoint used by other services (e.g., Data Service) to delete a single media object.
        It removes both the metadata document from MongoDB and the associated object from MinIO.
        
        Not exposed to external clients; protected by mTLS and service-to-service auth.
      servers:
        - url: /
